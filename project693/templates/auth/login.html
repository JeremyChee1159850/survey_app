{% extends "site_layout.html" %} 
{% block title %}Log in{% endblock %} 
{% block content %}

<div class="row justify-content-center align-items-center mt-5">
    <div class="col-12 col-md-8 col-lg-6 col-xl-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="text-center">Log in</h2>
                <form action="{{ url_for('login') }}" method="POST" autocomplete="off">
                    <div class="form-group mb-3">
                        <label for="user_name" class="form-label">Username</label>
                        <input type="text" class="form-control" name="login_username" placeholder="Please enter your username" value="{{ login_username }}" autocomplete="new-username" maxlength="20" required />
                    </div>
                    <div class="form-group mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" name="login_password" placeholder="Please enter your password" value="{{ login_password }}" autocomplete="new-password" maxlength="20" required />
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark">Log in</button>
                    </div>
                </form>

                {% for message in get_flashed_messages() %}
                <div class="alert alert-info mt-3">{{ message }}</div>
                {% endfor %}

            </div>
        </div>
    </div>
</div>

{% endblock %}
