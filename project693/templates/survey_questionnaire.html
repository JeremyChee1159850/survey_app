{% extends "site_layout.html" %}
{% block title %}Survey Final Question{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 720px;">
    <div class="bg-light p-5 rounded shadow-sm">
        <h2 class="text-center text-dark fw-bold mb-4">Final Question</h2>
        <p class="text-center fs-5 mb-4">What characteristics made you prefer certain plants over others?</p>

        <form method="POST" action="{{ url_for('survey_questionnaire') }}">
            <div class="d-grid gap-3">

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="reasoning" value="Color" id="reasonColor" required>
                    <label class="form-check-label fs-5" for="reasonColor">Color</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="reasoning" value="Shape" id="reasonShape">
                    <label class="form-check-label fs-5" for="reasonShape">Shape</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="reasoning" value="Familiarity" id="reasonFamiliarity">
                    <label class="form-check-label fs-5" for="reasonFamiliarity">Familiarity</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="reasoning" value="Novelty" id="reasonNovelty">
                    <label class="form-check-label fs-5" for="reasonNovelty">Novelty</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="reasoning" value="General Plant Form" id="reasonForm">
                    <label class="form-check-label fs-5" for="reasonForm">General Plant Form</label>
                </div>
            </div>

            <div class="text-center mt-5">
                <button type="submit" class="btn btn-success btn-lg px-5">Submit</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
