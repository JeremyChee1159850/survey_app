{% extends "site_layout.html" %} 
{% block content %}
<div class="container mt-5">
    <h1 class="mb-4 text-center">Competitions</h1>
    
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
        {% for theme in themes %}
            <div class="col">
                <div class="card h-100">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{ theme[1] }}</h5>
                        <p class="card-text">{{ theme[2] }}</p>
                        <div class="mt-auto">
                            <a href="{{ url_for('theme_details_new', theme_id=theme[0]) }}" class="btn btn-primary">View Details</a>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
